# Service-Definitionen für ha_fleet_agent.
# UI-Texte (name/description) liegen in translations/<lang>.json
# unter services.<service>.{name,description,fields.*}.

grant_pre_authorization:
  fields:
    expires_in_hours:
      required: true
      example: 8
      selector:
        number:
          min: 1
          max: 168
          step: 1
          unit_of_measurement: h
    max_duration_hours:
      required: false
      example: 4
      selector:
        number:
          min: 1
          max: 12
          step: 1
          unit_of_measurement: h

revoke_pre_authorization:

close_tunnel:

confirm_request:
  fields:
    request_id:
      required: true
      example: req_abc123
      selector:
        text:
    accepted:
      required: true
      example: true
      selector:
        boolean:
    duration_hours:
      required: false
      example: 4
      selector:
        number:
          min: 1
          max: 12
          step: 1
          unit_of_measurement: h
